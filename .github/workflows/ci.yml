name: SkillSphereAI E2E Test Suite CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  web-tests:
    name: Selenium E2E Web Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install Project Dependencies
      run: npm install

    - name: Install Selenium Suite Dependencies
      working-directory: ./selenium-tests
      run: npm install

    - name: Run Web App and Selenium E2E Tests
      working-directory: ./selenium-tests
      env:
        TEST_HEADLESS: "true"
      run: node run_suite.js

    - name: Upload Selenium Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: selenium-test-report
        path: selenium-tests/selenium_test_report.xlsx

  mobile-tests:
    name: Appium E2E Mobile Tests (Simulation Mode)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python Dependencies
      working-directory: ./appium-tests
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Appium E2E Tests (Dry-Run / Simulation Mode)
      working-directory: ./appium-tests
      env:
        APPIUM_DRY_RUN: "true"
      run: python run_suite.py

    - name: Upload Appium Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: appium-test-report
        path: appium-tests/appium_test_report.xlsx
